<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Usage Meter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">AI Usage Meter</h1>
      <p class="privacy-note">
        Prompt content is not stored. Only token and cost metadata are saved
        locally.
      </p>
    </header>

    <section class="section">
      <div class="platform-row">
        <span class="label">Platform</span>
        <span class="platform-badge" id="platform-badge">—</span>
      </div>

      <div class="field">
        <label class="label">Detected model</label>
        <div class="detected-model-row">
          <span class="detected-model" id="detected-model">—</span>
          <span class="detected-model-source" id="detected-model-source"></span>
        </div>
      </div>

      <div class="field" id="manual-model-field">
        <label class="label" for="model-select">Manual override model</label>
        <select id="model-select" class="select"></select>
      </div>
    </section>

    <section class="section stats-section" id="stats-section">
      <h2 class="section__title">Today</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-card__label">Tokens</span>
          <span class="stat-card__value" id="today-tokens">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__label">Est. cost</span>
          <span class="stat-card__value" id="today-cost">$0.00</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__label">Prompts</span>
          <span class="stat-card__value" id="today-prompts">0</span>
        </div>
      </div>

      <h2 class="section__title">This month</h2>
      <div class="stats-grid stats-grid--two">
        <div class="stat-card">
          <span class="stat-card__label">Tokens</span>
          <span class="stat-card__value" id="month-tokens">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__label">Est. cost</span>
          <span class="stat-card__value" id="month-cost">$0.00</span>
        </div>
      </div>

      <div class="most-used">
        <span class="label">Most used platform today</span>
        <span class="most-used__value" id="most-used-platform">—</span>
      </div>
    </section>

    <section class="section">
      <h2 class="section__title">Recent usage</h2>
      <ul class="recent-list" id="recent-list">
        <li class="recent-list__empty">No usage recorded yet.</li>
      </ul>
    </section>

    <footer class="footer">
      <button type="button" class="link-btn" id="open-options">Options</button>
    </footer>

    <script src="../src/utils.js"></script>
    <script src="../src/tokenizer.js"></script>
    <script src="../src/pricing.js"></script>
    <script src="../src/platformDetector.js"></script>
    <script src="../src/modelDetector.js"></script>
    <script src="../src/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
